<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;font-size:10.5pt;color:#1a1a2e;background:#dde3ee;min-height:100vh}

/* FILTER BAR */
#filter-bar{position:sticky;top:0;z-index:200;background:#06174a;padding:11px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;box-shadow:0 4px 18px rgba(0,0,0,.4)}
.fb-brand{color:#fff;font-size:9pt;font-weight:800;letter-spacing:2px;text-transform:uppercase;opacity:.65;white-space:nowrap;margin-right:4px}
.fb-sep{width:1px;height:26px;background:rgba(255,255,255,.2);flex-shrink:0}
.fb-lbl{color:rgba(255,255,255,.45);font-size:7pt;font-weight:700;letter-spacing:.8px;text-transform:uppercase;white-space:nowrap}
.fb-tabs{display:flex;gap:4px}
.fb-tab{background:transparent;border:1.5px solid rgba(255,255,255,.28);color:rgba(255,255,255,.65);padding:5px 15px;border-radius:20px;font-size:8pt;font-weight:700;cursor:pointer;transition:all .15s;text-transform:uppercase;font-family:inherit;letter-spacing:.4px}
.fb-tab:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.5)}
.fb-tab.active{background:#fff;color:#06174a;border-color:#fff}
.fb-input,.fb-sel{background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.28);color:#fff;padding:5px 12px;border-radius:20px;font-size:8pt;font-family:inherit;cursor:pointer;outline:none}
.fb-input:focus,.fb-sel:focus{border-color:rgba(255,255,255,.65)}
.fb-input::-webkit-calendar-picker-indicator{filter:invert(1);opacity:.55}
.fb-sel option{background:#06174a;color:#fff}
#fb-err{color:#ff8a65;font-size:7.5pt;font-weight:700;display:none}

/* CONTENT */
#content{max-width:990px;margin:26px auto;padding:0 20px 50px}

/* CARD */
.card{background:#fff;border-radius:14px;box-shadow:0 6px 32px rgba(0,0,0,.12);overflow:hidden;margin-bottom:26px}

/* CARD HEADER */
.ch{background:linear-gradient(135deg,#06174a 0%,#0d3b8c 55%,#1565c0 100%);color:#fff;padding:30px 44px 22px}
.ch.agenda{background:linear-gradient(135deg,#1a237e 0%,#283593 55%,#3949ab 100%)}
.ch-logo{font-size:8.5pt;font-weight:700;letter-spacing:3px;text-transform:uppercase;opacity:.55;margin-bottom:5px}
.ch-title{font-size:23pt;font-weight:900;line-height:1.05;letter-spacing:-.3px}
.ch-sub{margin-top:8px;font-size:8pt;opacity:.8;display:flex;gap:18px;flex-wrap:wrap}
.ch-sub span::before{content:'▸  '}
.ch-bar{margin-top:16px;height:2px;background:rgba(255,255,255,.18);border-radius:2px}

/* KPI GRID */
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);border-bottom:2px solid #e8eaf0}
.kpi-box{padding:16px 10px;text-align:center;border-right:1px solid #e8eaf0}
.kpi-box:last-child{border-right:none}
.kn{font-size:26pt;font-weight:900;color:#06174a;line-height:1}
.kn.g{color:#1b5e20}.kn.b{color:#1565c0}.kn.o{color:#e65100}.kn.gray{color:#9e9e9e}.kn.teal{color:#006064}
.kl{font-size:7pt;color:#777;text-transform:uppercase;letter-spacing:.6px;margin-top:4px;font-weight:700}

/* SECTION */
.sec{padding:20px 44px;border-bottom:1px solid #e8eaf0}
.sec:last-of-type{border-bottom:none}
.sec-title{font-size:8pt;font-weight:800;text-transform:uppercase;letter-spacing:1.2px;color:#06174a;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.sec-title::after{content:'';flex:1;height:2px;background:linear-gradient(to right,#1565c0,transparent);border-radius:2px}
.sec-title.past{color:#607d8b}
.sec-title.past::after{background:linear-gradient(to right,#90a4ae,transparent)}

/* DAY BLOCK */
.db{margin-bottom:16px}
.db:last-child{margin-bottom:0}
.dh{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;border-radius:6px 6px 0 0;font-size:8.5pt;font-weight:700;color:#fff}
.dh.now{background:linear-gradient(90deg,#1a237e,#3949ab)}
.dh.fut{background:linear-gradient(90deg,#06174a,#1565c0)}
.dh.past{background:linear-gradient(90deg,#455a64,#78909c)}
.dc{font-size:7.5pt;opacity:.82;font-weight:600}

/* TABLE */
table{width:100%;border-collapse:collapse;font-size:8.8pt}
th{background:#06174a;color:#fff;padding:7px 10px;text-align:left;font-weight:700;font-size:7.5pt;text-transform:uppercase;letter-spacing:.4px}
td{padding:7px 10px;border-bottom:1px solid #eef0f5;vertical-align:top;line-height:1.4}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f8f9fd}
.th-past{background:#607d8b}

/* BADGES */
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:7pt;font-weight:700;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap}
.b-blue{background:#e3f2fd;color:#0d47a1}
.b-orange{background:#fff3e0;color:#e65100}
.b-green{background:#e8f5e9;color:#1b5e20}
.b-gray{background:#f5f5f5;color:#757575}
.b-purple{background:#f3e5f5;color:#6a1b9a}
.b-teal{background:#e0f7fa;color:#006064}
.b-yellow{background:#fff9c4;color:#f57f17}
.b-won{background:#c8e6c9;color:#1b5e20;border:1px solid #a5d6a7}
.vc{display:inline-block;padding:2px 7px;border-radius:8px;font-size:7pt;font-weight:700;background:#e8eaf6;color:#3949ab;margin-right:2px;white-space:nowrap}

/* ALERTS */
.alert{padding:10px 14px;border-radius:6px;font-size:8.5pt;margin-bottom:10px}
.al-info{background:#e3f2fd;border-left:4px solid #1565c0;color:#0d47a1}
.al-warn{background:#fff3e0;border-left:4px solid #e65100;color:#bf360c}
.al-red{background:#ffebee;border-left:4px solid #c62828;color:#b71c1c}
.al-gray{background:#f5f5f5;border-left:4px solid #9e9e9e;color:#424242}

/* ACTIVITY BAR */
.abar{display:flex;align-items:center;gap:6px}
.atrack{flex:1;height:8px;background:#e8eaf0;border-radius:4px;overflow:hidden}
.afill{height:100%;background:linear-gradient(90deg,#1565c0,#42a5f5);border-radius:4px}
.anum{font-weight:700;font-size:8pt;color:#1565c0;min-width:18px;text-align:right}

/* VENDOR CARD (MES) */
.vcard{border:1px solid #e8eaf0;border-radius:8px;padding:13px 16px;margin-bottom:10px}
.vcard-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.vname{font-weight:800;font-size:10pt;color:#06174a}
.vstats{display:flex;gap:12px;font-size:7.5pt;color:#777}

/* EMPTY STATE */
.empty{text-align:center;padding:60px 24px;color:#bbb}
.empty-ico{font-size:38pt;margin-bottom:10px}
.empty h2{font-size:15pt;color:#ccc;font-weight:700;margin-bottom:5px}
.empty p{font-size:9pt}

/* CARD FOOTER */
.cf{background:#06174a;color:rgba(255,255,255,.65);padding:14px 44px;display:flex;justify-content:space-between;font-size:7.5pt}
</style>

var DN = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];

function iso2d(s){return new Date(s+'T00:00:00');}
function d2iso(d){return d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate());}
function p2(n){return n<10?'0'+n:''+n;}
function fmtFull(iso){var d=iso2d(iso);return DN[d.getDay()]+' '+d.getDate()+' de '+MN[d.getMonth()+1]+' '+d.getFullYear();}
function fmtShort(iso){var d=iso2d(iso);return d.getDate()+' '+MN[d.getMonth()+1].substr(0,3);}
function vn(k){return VENDORS[k]||k;}
function chip(k){return '<span class="vc">'+vn(k)+'</span>';}

function filter(from,to,v){
  return M.filter(function(m){
    var ok=m.d>=from&&m.d<=to;
    if(!ok)return false;
    if(v==='all')return true;
    return m.v.indexOf(v)>=0;
  }).sort(function(a,b){return(a.d+a.t).localeCompare(b.d+b.t);});
}

function stats(list){
  var pr=0,sg=0,wn=0,wa=[];
  list.forEach(function(m){
    var t=m.type.toLowerCase();
    if(t.indexOf('1ra')>=0||t.indexOf('cliente')>=0)pr++;else sg++;
    if(m.won){wn++;wa.push(m.won);}
  });
  return{pr:pr,sg:sg,wn:wn,wa:wa};
}

function uniqV(list){
  var s={};list.forEach(function(m){m.v.forEach(function(vv){s[vv]=1;});});return Object.keys(s).length;
}

// ═══════════════════════ RENDER ═══════════════════════

function renderRow(m,showV){
  var won=m.won?'&nbsp;<span class="badge b-won">🏆 WON '+m.won+'</span>':'';
  var nw=m.isNew?'&nbsp;<span class="badge b-yellow">⚡ Nueva</span>':'';
  return '<tr>'
    +'<td><strong>'+m.t+'</strong></td>'
    +'<td><strong>'+m.co+'</strong>'+won+nw+'</td>'
    +(showV?'<td>'+m.v.map(chip).join('')+'</td>':'')
    +'<td><span class="badge '+m.badge+'">'+m.type+'</span></td>'
    +'<td style="font-size:8pt;color:#555">'+m.contact+(m.notes?'<br><span style="color:#999">'+m.notes+'</span>':'')+'</td>'
    +'</tr>';
}

function renderTable(list,showV,past){
  if(!list.length)return'<p style="color:#bbb;font-style:italic;padding:10px 0;font-size:8.5pt">Sin reuniones para este criterio.</p>';
  var thCls=past?'th-past':'';
  return'<table><thead><tr class="'+thCls+'"><th>Hora</th><th>Empresa</th>'+(showV?'<th>Vendedor</th>':'')+'<th>Tipo</th><th>Contacto / Notas</th></tr></thead><tbody>'
    +list.map(function(m){return renderRow(m,showV);}).join('')+'</tbody></table>';
}

function renderKpis(list,extra){
  var s=stats(list),uv=uniqV(list);
  var boxes=[
    {n:list.length,l:'Reuniones',c:''},
    {n:s.pr,l:'1ras reuniones',c:'g'},
    {n:s.sg,l:'Seguimientos',c:'o'},
    {n:uv,l:'Vendedores activos',c:'teal'},
    extra||{n:s.wn,l:'Deals ganados',c:'g'}
  ];
  return'<div class="kpi-grid">'+boxes.map(function(b){
    return'<div class="kpi-box"><div class="kn '+b.c+'">'+b.n+'</div><div class="kl">'+b.l+'</div></div>';
  }).join('')+'</div>';
}

function renderDayBlock(date,list,showV){
  var isT=date===TODAY,isPast=date<TODAY;
  var cls=isT?'now':(isPast?'past':'fut');
  var lbl=isT?' — HOY':'';
  var cnt=list.length?list.length+' reunión'+(list.length!==1?'es':''):'Sin reuniones';
  return'<div class="db">'
    +'<div class="dh '+cls+'"><span>'+fmtFull(date)+lbl+'</span><span class="dc">'+cnt+'</span></div>'
    +(list.length
      ?renderTable(list,showV,isPast)
      :'<div class="alert al-gray" style="border-radius:0 0 6px 6px;margin:0">Sin reuniones comerciales.</div>')
    +'</div>';
}

function renderScoreboard(list){
  if(!list.length)return'';
  var sc={};
  list.forEach(function(m){m.v.forEach(function(vv){
    if(!sc[vv])sc[vv]={t:0,pr:0,wn:0};
    sc[vv].t++;var tt=m.type.toLowerCase();
    if(tt.indexOf('1ra')>=0||tt.indexOf('cliente')>=0)sc[vv].pr++;
    if(m.won)sc[vv].wn++;
  });});
  var keys=Object.keys(sc).sort(function(a,b){return sc[b].t-sc[a].t;});
  var mx=sc[keys[0]].t;
  return'<div class="sec">'
    +'<div class="sec-title">📊 Scoreboard</div>'
    +'<table><thead><tr><th>Vendedor</th><th>Reuniones</th><th>1ras</th><th>Actividad</th></tr></thead><tbody>'
    +keys.map(function(vv){
      var s=sc[vv],pct=mx?Math.round(s.t/mx*100):0;
      var won=s.wn?'&nbsp;<span class="badge b-won">🏆 '+s.wn+'</span>':'';
      return'<tr><td><strong>'+vn(vv)+'</strong></td><td>'+s.t+'</td><td>'+s.pr+'</td>'
        +'<td><div class="abar"><div class="atrack"><div class="afill" style="width:'+pct+'%"></div></div><span class="anum">'+s.t+'</span></div>'+won+'</td></tr>';
    }).join('')+'</tbody></table></div>';
}

function renderTasks(hasMtg,vendorF){
  var toShow=vendorF==='all'
    ?TEAM.filter(function(v){return hasMtg.indexOf(v)<0;})
    :(hasMtg.indexOf(vendorF)<0&&vendorF!=='bautista'?[vendorF]:[]);
  if(!toShow.length)return'';
  var rows=toShow.map(function(v){
    var isNew=v==='pablo-illich';
    var nm=vn(v)+(isNew?'<br><span class="badge b-teal" style="margin-top:3px">Nuevo</span>':'');
    return'<tr><td><strong>'+nm+'</strong></td>'
      +'<td>Llamados a prospectos desde secuencias Apollo. Priorizar actividad reciente.</td>'
      +'<td>'+( PIPELINE[v]||'—' )+'</td>'
      +'<td>3 contactos nuevos vía LinkedIn + mail frío · <strong>1 reunión nueva con potencial cliente (obligatoria)</strong></td></tr>';
  });
  return'<div class="sec">'
    +'<div class="sec-title">📋 Vendedores sin reuniones — Tareas</div>'
    +'<div class="alert al-info" style="margin-bottom:12px">Estos vendedores no tienen reuniones hoy. Tres tareas obligatorias.</div>'
    +'<table><thead><tr><th>Vendedor</th><th>Tarea 1 — Apollo</th><th>Tarea 2 — Pipeline activo</th><th>Tarea 3 — Prospección</th></tr></thead>'
    +'<tbody>'+rows.join('')+'</tbody></table></div>';
}

// ── DÍA ──
function renderDia(date,v){
  var list=filter(date,date,v);
  var allDay=filter(date,date,'all');
  var hasMtg=[];allDay.forEach(function(m){m.v.forEach(function(vv){if(hasMtg.indexOf(vv)<0)hasMtg.push(vv);});});
  var isT=date===TODAY,isPast=date<TODAY;
  var hdrCls=isT?'agenda':'';
  var sinR=TEAM.filter(function(vv){return hasMtg.indexOf(vv)<0;}).length;

  var h='<div class="card"><div class="ch '+hdrCls+'">';
  h+='<div class="ch-logo">Nubceo · Dirección Comercial</div>';
  h+='<div class="ch-title">Agenda del Día<br>'+fmtFull(date)+(isT?' — HOY':'')+'</div>';
  h+='<div class="ch-sub"><span>'+list.length+' reunión'+(list.length!==1?'es':'')+' · '+(v==='all'?'Todos los vendedores':vn(v))+'</span>';
  h+='<span>Fuente: Google Calendar — agenda.virtual@nubceo.com</span></div>';
  h+='<div class="ch-bar"></div></div>';
  h+=renderKpis(list,{n:sinR,l:'Sin reuniones',c:'gray'});

  if(!allDay.length){
    h+='<div class="empty"><div class="empty-ico">📭</div><h2>Sin reuniones</h2><p>No hay reuniones comerciales registradas para este día.</p></div>';
  }else{
    h+='<div class="sec"><div class="sec-title '+(isPast?'past':'')+'">🗓 Reuniones del día</div>';
    h+=renderTable(list,v==='all',isPast);
    h+='</div>';
    h+=renderTasks(hasMtg,v);
  }
  h+='<div class="cf"><div><strong style="color:#fff">'+fmtFull(date)+'</strong><br>'+list.length+' reuniones con agenda.virtual</div>';
  h+='<div style="text-align:right">agenda.virtual@nubceo.com<br>bautista.lanusse@nubceo.com</div></div>';
  h+='</div>';
  return h;
}

// ── SEMANA ──
function renderSemana(from,to,v){
  var allList=filter(from,to,v);
  var dates=[],cur=iso2d(from),end=iso2d(to);
  while(cur<=end){dates.push(d2iso(new Date(cur)));cur.setDate(cur.getDate()+1);}

  var h='<div class="card"><div class="ch">';
  h+='<div class="ch-logo">Nubceo · Dirección Comercial</div>';
  h+='<div class="ch-title">Reporte Semanal<br>'+fmtShort(from)+' al '+fmtShort(to)+'</div>';
  h+='<div class="ch-sub"><span>'+(v==='all'?'Todos los vendedores':vn(v))+'</span></div>';
  h+='<div class="ch-bar"></div></div>';
  h+=renderKpis(allList);
  h+='<div class="sec"><div class="sec-title">📅 Reuniones por día</div>';
  dates.forEach(function(d){
    var dl=filter(d,d,v);
    h+=renderDayBlock(d,dl,v==='all');
  });
  h+='</div>';
  if(v==='all')h+=renderScoreboard(allList);
  h+='<div class="cf"><div><strong style="color:#fff">Semana '+fmtShort(from)+' — '+fmtShort(to)+'</strong><br>'+allList.length+' reuniones</div>';
  h+='<div style="text-align:right">bautista.lanusse@nubceo.com</div></div></div>';
  return h;
}

// ── MES ──
function renderMes(month,v){
  var p=month.split('-'),yr=+p[0],mo=+p[1];
  var from=month+'-01',ld=new Date(yr,mo,0).getDate(),to=month+'-'+p2(ld);
  var allList=filter(from,to,v);
  var s=stats(allList);
  var byDay={};
  allList.forEach(function(m){if(!byDay[m.d])byDay[m.d]=[];byDay[m.d].push(m);});
  var days=Object.keys(byDay).sort();
  var mnLabel=MN[mo]+' '+yr;

  // vendor summary
  var vsum={};
  allList.forEach(function(m){m.v.forEach(function(vv){
    if(!vsum[vv])vsum[vv]={list:[],pr:0,sg:0,wn:0,wa:[]};
    vsum[vv].list.push(m);
    var tt=m.type.toLowerCase();
    if(tt.indexOf('1ra')>=0||tt.indexOf('cliente')>=0)vsum[vv].pr++;else vsum[vv].sg++;
    if(m.won){vsum[vv].wn++;vsum[vv].wa.push(m.won);}
  });});
  var vsorted=Object.keys(vsum).sort(function(a,b){return vsum[b].list.length-vsum[a].list.length;});

  var h='<div class="card"><div class="ch">';
  h+='<div class="ch-logo">Nubceo · Dirección Comercial</div>';
  h+='<div class="ch-title">Reporte Mensual<br>'+mnLabel+'</div>';
  h+='<div class="ch-sub"><span>'+(v==='all'?'Todos los vendedores':vn(v))+'</span>';
  if(s.wn)h+='<span>🏆 Deals ganados: '+s.wa.join(', ')+'</span>';
  h+='</div><div class="ch-bar"></div></div>';
  h+=renderKpis(allList,{n:s.wn?s.wa.join('+'):'0',l:'Deals ganados',c:'g'});

  if(!allList.length){
    h+='<div class="empty"><div class="empty-ico">📭</div><h2>Sin datos</h2><p>No hay reuniones registradas para este mes con los filtros aplicados.</p></div>';
  }else{
    // Activity by day
    h+='<div class="sec"><div class="sec-title">📅 Actividad por día — '+mnLabel+'</div>';
    days.forEach(function(d){h+=renderDayBlock(d,byDay[d],v==='all');});
    h+='</div>';

    // Vendor breakdown (only in "all" view)
    if(v==='all'&&vsorted.length){
      h+='<div class="sec"><div class="sec-title">👥 Resumen por vendedor</div>';
      vsorted.forEach(function(vv){
        var sv=vsum[vv];
        var wonBadge=sv.wn?'<span class="badge b-won" style="margin-left:8px">🏆 WON '+sv.wa.join(', ')+'</span>':'';
        h+='<div class="vcard">';
        h+='<div class="vcard-head"><span class="vname">'+vn(vv)+wonBadge+'</span>';
        h+='<div class="vstats"><span>'+sv.list.length+' reuniones</span><span class="kn g" style="font-size:11pt">'+sv.pr+'</span>&nbsp;leads&nbsp;<span class="kn o" style="font-size:11pt">'+sv.sg+'</span>&nbsp;seguimientos</div></div>';
        h+='<div style="font-size:8pt;color:#555;margin-top:4px">';
        h+=sv.list.map(function(m){
          return '<span style="margin-right:10px"><strong>'+m.t+'</strong>&nbsp;<span class="badge '+m.badge+'">'+m.type+'</span>&nbsp;'+m.co+(m.won?'&nbsp;<span class="badge b-won">🏆 WON '+m.won+'</span>':'')+'</span>';
        }).join('<br>');
        h+='</div></div>';
      });
      h+='</div>';
      h+=renderScoreboard(allList);
    }else if(v!=='all'){
      // Single vendor: table by day
      h+='<div class="sec"><div class="sec-title">📋 Pipeline — '+vn(v)+'</div>';
      h+='<div class="alert al-info">'+( PIPELINE[v]||'Sin datos de pipeline.' )+'</div></div>';
    }
  }
  h+='<div class="cf"><div><strong style="color:#fff">'+mnLabel+'</strong><br>'+allList.length+' reuniones · '+days.length+' días activos</div>';
  h+='<div style="text-align:right">bautista.lanusse@nubceo.com</div></div></div>';
  return h;
}

// ═══════════════════════ STATE ═══════════════════════

var ST={view:'dia',date:TODAY,from:'',to:'',month:'2026-04',vendor:'all'};

function go(){
  var html='';
  if(ST.view==='dia'){
    html=ST.date
      ?renderDia(ST.date,ST.vendor)
      :'<div class="empty"><div class="empty-ico">📅</div><h2>Seleccioná un día</h2><p>Usá el selector de fecha.</p></div>';
  }else if(ST.view==='semana'){
    html=(ST.from&&ST.to)
      ?renderSemana(ST.from,ST.to,ST.vendor)
      :'<div class="empty"><div class="empty-ico">📅</div><h2>Seleccioná un rango</h2><p>Del → Al, máximo 7 días.</p></div>';
  }else{
    html=renderMes(ST.month,ST.vendor);
  }
  document.getElementById('content').innerHTML=html;
}

// ═══════════════════════ EVENTS ═══════════════════════

document.querySelectorAll('.fb-tab').forEach(function(btn){
  btn.addEventListener('click',function(){
    document.querySelectorAll('.fb-tab').forEach(function(b){b.classList.remove('active');});
    btn.classList.add('active');
    ST.view=btn.dataset.view;
    document.getElementById('ctrl-dia').style.display=ST.view==='dia'?'flex':'none';
    document.getElementById('ctrl-sem').style.display=ST.view==='semana'?'flex':'none';
    document.getElementById('ctrl-mes').style.display=ST.view==='mes'?'flex':'none';
    go();
  });
});

document.getElementById('fb-date').addEventListener('change',function(){ST.date=this.value;go();});

document.getElementById('fb-from').addEventListener('change',function(){
  ST.from=this.value;
  if(ST.from&&(!ST.to||ST.to<ST.from)){
    var d=iso2d(ST.from);d.setDate(d.getDate()+6);
    ST.to=d2iso(d);document.getElementById('fb-to').value=ST.to;
  }
  chkRange();go();
});
document.getElementById('fb-to').addEventListener('change',function(){ST.to=this.value;chkRange();go();});
document.getElementById('fb-month').addEventListener('change',function(){ST.month=this.value;go();});
document.getElementById('fb-vendor').addEventListener('change',function(){ST.vendor=this.value;go();});

function chkRange(){
  var err=document.getElementById('fb-err');
  if(ST.from&&ST.to){
    var diff=Math.round((iso2d(ST.to)-iso2d(ST.from))/(864e5));
    err.style.display=(diff>6||diff<0)?'':'none';
  }
}

// ── INIT ──
go();
</script>
