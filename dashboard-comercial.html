<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nubceo · Dashboard Comercial</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<!-- Carga de Google Identity Services -->
<script src="https://accounts.google.com/gsi/client" async defer></script>
<!-- Carga de Google API Client Library -->
<script src="https://apis.google.com/js/api.js"></script>

<style>
:root{--navy:#0d1b4b;--blue:#1a237e;--mid:#3949ab;--p:#1565c0;--p-bg:#e3f2fd;--s:#e65100;--s-bg:#fff3e0;--x:#6a1b9a;--x-bg:#f3e5f5;--won:#2e7d32;--won-bg:#e8f5e9;--sur:#fff;--bg:#f0f3fb;--bdr:#e0e4f0;--tx:#1c1c2e;--mt:#666;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--tx);font-size:9pt;}
.hidden{display:none!important;}

/* LOGIN SCREEN */
#loginScreen{position:fixed;inset:0;background:linear-gradient(135deg,#0d1b4b 0%,#1a237e 60%,#3949ab 100%);display:flex;align-items:center;justify-content:center;z-index:9999;}
.lc{background:rgba(255,255,255,.08);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:48px 40px;max-width:380px;width:100%;text-align:center;}
.lc-brand{font-size:22pt;font-weight:900;color:#fff;letter-spacing:-1px;}
.lc-sub{font-size:10pt;color:rgba(255,255,255,.6);margin-bottom:28px;}
.client-input{width:100%;margin-bottom:20px;padding:9px 12px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);border-radius:8px;color:#fff;font-size:8.5pt;text-align:center;}
.btn-demo{width:100%;margin-top:10px;padding:11px;background:transparent;border:1px solid rgba(255,255,255,.2);border-radius:10px;cursor:pointer;font-size:9pt;color:rgba(255,255,255,.55);transition:.15s;}
.btn-demo:hover{color:#fff;border-color:rgba(255,255,255,.4);}

/* TOPBAR */
.topbar{height:52px;background:linear-gradient(135deg,#0d1b4b,#1a237e 60%,#3949ab);display:flex;align-items:center;padding:0 20px;position:sticky;top:0;z-index:100;}
.tb-brand{display:flex;align-items:center;gap:8px;font-weight:800;font-size:12pt;color:#fff;padding-right:20px;}
.tb-tabs{display:flex;align-items:center;gap:2px;padding:0 16px;flex:1;}
.tb-tab{background:none;border:none;color:rgba(255,255,255,.6);padding:6px 13px;border-radius:6px;font-size:8.5pt;cursor:pointer;font-weight:500;}
.tb-tab:hover,.tb-tab.on{background:rgba(255,255,255,.15);color:#fff;}
.tb-right{display:flex;align-items:center;gap:12px;margin-left:auto;}
.sync-btn{padding:5px 12px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:7px;color:#fff;font-size:8pt;cursor:pointer;}
.tb-clock{font-size:10pt;font-weight:700;color:rgba(255,255,255,.85);font-variant-numeric:tabular-nums;}
.tb-user{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:4px 10px 4px 4px;color:#fff;font-size:8pt;font-weight:600;}

/* PERIOD HEADER */
.period-hd{background:linear-gradient(135deg,#0d1b4b,#1a237e);color:#fff;padding:20px 24px 0;}
.ph-title{font-size:18pt;font-weight:900;margin-bottom:16px;}
.kpi-strip{display:flex;gap:10px;flex-wrap:wrap;padding-bottom:18px;}
.kp{background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.13);border-radius:10px;padding:9px 16px;text-align:center;min-width:90px;}
.kp .n{font-size:18pt;font-weight:900;line-height:1;}
.kp .l{font-size:6.5pt;opacity:.7;text-transform:uppercase;}

/* MAIN CONTENT */
.content{padding:20px 24px;max-width:1200px;margin:0 auto;}
.card{background:#fff;border:1px solid var(--bdr);border-radius:12px;padding:18px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.04);}

/* MEETINGS */
.day-top{margin-bottom:16px;}
.day-top input{border:2px solid var(--mid);border-radius:8px;padding:7px 11px;font-size:9pt;}
.mr{border:1px solid var(--bdr);border-radius:10px;background:#fff;margin-bottom:8px;cursor:pointer;}
.mr.primera{border-left:4px solid var(--p);}
.mr.seguimiento{border-left:4px solid var(--s);}
.mr.partner{border-left:4px solid var(--x);}
.mh{display:flex;align-items:center;padding:11px 14px;gap:12px;}
.mt{font-size:11pt;font-weight:900;color:var(--blue);min-width:52px;}
.mt small{font-size:6pt;font-weight:400;color:#aaa;display:block;}
.mc{flex:1;}
.mn{font-size:10pt;font-weight:800;}
.mb{display:none;padding:0 14px 14px;}
.mr.open .mb{display:block;}
.ctx{background:#f8f9ff;padding:10px;border-radius:8px;font-size:8pt;margin-top:10px;}
.meet-btn{display:inline-block;padding:8px 16px;background:#2e7d32;color:white;border-radius:8px;text-decoration:none;font-weight:bold;margin-top:10px;}

/* BADGES */
.bdg{padding:3px 9px;border-radius:20px;font-size:6.5pt;font-weight:700;text-transform:uppercase;}
.bdg.primera{background:var(--p-bg);color:var(--p);}
.bdg.seguimiento{background:var(--s-bg);color:var(--s);}
.bdg.partner{background:var(--x-bg);color:var(--x);}
.vc{background:var(--blue);color:white;padding:2px 9px;border-radius:20px;font-size:7pt;}

/* RANKING */
.rtable{width:100%;border-collapse:collapse;}
.rtable th{font-size:7pt;text-transform:uppercase;color:#888;text-align:left;padding:7px;border-bottom:2px solid var(--bdr);}
.rtable td{padding:8px;border-bottom:1px solid var(--bdr);}

/* VENDORS */
.vgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;}
.vcard{background:#fff;border:1px solid var(--bdr);border-radius:10px;padding:14px;}
.vtot{font-size:22pt;font-weight:900;color:var(--blue);float:right;}

</style>
</head>
<body>

<!-- PANTALLA DE LOGIN -->
<div id="loginScreen">
  <div class="lc">
    <div class="lc-brand">Nubceo Dashboard</div>
    <div class="lc-sub">Comercial & Tracking</div>
    
    <input type="text" id="clientIdInput" class="client-input" placeholder="Google Client ID (xxxx.apps.googleusercontent.com)" />
    
    <div id="g_id_onload"
         data-context="signin"
         data-ux_mode="popup"
         data-callback="handleCredentialResponse"
         data-auto_prompt="false">
    </div>
    
    <div class="g_id_signin"
         data-type="standard"
         data-shape="rectangular"
         data-theme="outline"
         data-text="signin_with"
         data-size="large"
         data-logo_alignment="left"
         style="margin: 0 auto; display: flex; justify-content: center; margin-top: 15px;">
    </div>

    <button class="btn-demo" onclick="enterDemoMode()">Continuar con datos offline (Demo)</button>
  </div>
</div>

<!-- DASHBOARD MAIN -->
<div id="app" class="hidden">
  
  <div class="topbar">
    <div class="tb-brand">📊 Nubceo</div>
    <div class="tb-tabs">
      <button class="tb-tab on" onclick="setTab('agenda')">Agenda del Día</button>
      <button class="tb-tab" onclick="setTab('ranking')">Ranking del Mes</button>
      <button class="tb-tab" onclick="setTab('vendedores')">Vendedores</button>
    </div>
    <div class="tb-right">
      <button class="sync-btn" onclick="syncCalendar()">🔄 Sincronizar</button>
      <div id="clk" class="tb-clock">--:--</div>
      <div class="tb-user">
        <div id="userName">User</div>
        <button onclick="logout()" style="background:none;border:none;color:white;cursor:pointer;font-size:8pt;margin-left:5px;">[Salir]</button>
      </div>
    </div>
  </div>

  <div class="period-hd">
    <div class="ph-title" id="periodTitle">Dashboard Comercial</div>
    <div class="kpi-strip" id="kpiStrip"></div>
  </div>

  <div class="content">
    
    <!-- AGENDA TAB -->
    <div id="tab-agenda">
      <div class="day-top">
        <label>📅 Fecha:</label>
        <input type="date" id="datePicker">
      </div>
      <div class="card">
        <div class="sec-head"><h2>Reuniones</h2><div class="sec-line"></div></div>
        <div id="meetingsContainer"></div>
      </div>
    </div>

    <!-- RANKING TAB -->
    <div id="tab-ranking" class="hidden">
      <div class="card">
        <div class="sec-head"><h2>Ranking del Mes</h2><div class="sec-line"></div></div>
        <table class="rtable" id="rankingTable"></table>
      </div>
    </div>

    <!-- VENDEDORES TAB -->
    <div id="tab-vendedores" class="hidden">
      <div class="card">
        <div class="sec-head"><h2>Scorecards</h2><div class="sec-line"></div></div>
        <div class="vgrid" id="vendorGrid"></div>
      </div>
    </div>

  </div>
</div>

<script>
// --- VENDORS MAP ---
const VENDORS = {
  hernan: { name:'Hernán', color:'#1565c0', email:'hernan.pelosi@nubceo.com' },
  mateo: { name:'Mateo', color:'#6a1b9a', email:'mateo.lissarrague@nubceo.com' },
  omar: { name:'Omar', color:'#e65100', email:'omar@nubceo.com' },
  vanessa: { name:'Vanessa', color:'#00695c', email:'vanessa.aguilar@nubceo.com' },
  lucia: { name:'Lucía', color:'#c62828', email:'lucia@nubceo.com' },
  emiliana: { name:'Emiliana', color:'#2e7d32', email:'emiliana.gomezgiza@nubceo.com' },
  luciano: { name:'Luciano', color:'#0277bd', email:'luciano.rodriguez@nubceo.com' },
  federico: { name:'Federico', color:'#558b2f', email:'federico@nubceo.com' },
  pablo_arce: { name:'Pablo Arce', color:'#6d4c41', email:'pablo.arce@nubceo.com' },
  pablo_illich:{ name:'Pablo Illich', color:'#4527a0', email:'pablo.illich@nubceo.com' },
  bautista: { name:'Bautista', color:'#1a237e', email:'bautista.lanusse@nubceo.com' },
};

function getVendorByEmail(email) {
  for(let id in VENDORS) {
    if(VENDORS[id].email.toLowerCase() === email.toLowerCase()) return id;
  }
  return 'otro';
}

function getVendorName(id) { return VENDORS[id] ? VENDORS[id].name : id; }
function getVendorColor(id) { return VENDORS[id] ? VENDORS[id].color : '#555'; }

let ALL_MEETINGS = [];
let currentUser = null;
let tokenClient = null;
let access_token = null;

// --- CLOCK ---
setInterval(() => {
  document.getElementById('clk').textContent = new Date().toLocaleTimeString('es-AR', {hour:'2-digit',minute:'2-digit'});
}, 1000);

// --- TABS ---
function setTab(tab) {
  ['agenda','ranking','vendedores'].forEach(t => {
    document.getElementById('tab-'+t).classList.toggle('hidden', t !== tab);
  });
  document.querySelectorAll('.tb-tab').forEach(b => {
    b.classList.toggle('on', b.textContent.toLowerCase().includes(tab));
  });
  if(tab === 'ranking') renderRanking();
  if(tab === 'vendedores') renderVendors();
}

// --- CALENDAR LOGIC ---
function classifyMeeting(title) {
  const t = title.toLowerCase();
  if (/partner|alianza|sap|seidor|nodum|sucive/.test(t)) return 'partner';
  if (/cotizaci|propuesta|seguimiento|técnica|técnico|seg\.|2da|reunion tecnica/.test(t)) return 'seguimiento';
  return 'primera';
}

// Inicializar Google API (onload)
function initGAPI() {
  const cid = localStorage.getItem('nubceo_client_id');
  if(cid) {
    document.getElementById('clientIdInput').value = cid;
    document.getElementById('g_id_onload').setAttribute('data-client_id', cid);
  }
}

document.getElementById('clientIdInput').addEventListener('change', function() {
  localStorage.setItem('nubceo_client_id', this.value);
  document.getElementById('g_id_onload').setAttribute('data-client_id', this.value);
  // Reload GSI client with new ID
  location.reload();
});

function handleCredentialResponse(response) {
  const jwt = response.credential;
  const payload = JSON.parse(atob(jwt.split('.')[1]));
  currentUser = payload;
  document.getElementById('userName').textContent = payload.name;
  
  // Ocultar login
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  
  // Set today
  const today = new Date().toISOString().slice(0,10);
  document.getElementById('datePicker').value = today;
  
  // Init token client for API requests
  const cid = localStorage.getItem('nubceo_client_id');
  if(!cid) return alert("Falta el Client ID");
  
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: cid,
    scope: 'https://www.googleapis.com/auth/calendar.readonly',
    callback: (tokenResponse) => {
      access_token = tokenResponse.access_token;
      fetchCalendarData();
    },
  });
  
  // Request token right away
  tokenClient.requestAccessToken();
}

function enterDemoMode() {
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  const today = new Date().toISOString().slice(0,10);
  document.getElementById('datePicker').value = today;
  ALL_MEETINGS = [
    {date:today, time:'10:00', dur:60, title:'Demo Nubceo', vendor:'mateo', type:'primera', meet:null, contacts:['demo@cliente.com']},
    {date:today, time:'14:00', dur:30, title:'Propuesta Económica', vendor:'vanessa', type:'seguimiento', meet:null, contacts:['test@test.com']},
  ];
  renderAgenda(today);
}

function syncCalendar() {
  if(!tokenClient) return alert('No estás conectado a Google.');
  tokenClient.requestAccessToken();
}

function fetchCalendarData() {
  document.getElementById('periodTitle').textContent = "Sincronizando...";
  
  const now = new Date();
  const timeMin = new Date(now.getFullYear(), now.getMonth(), 1).toISOString(); // 1st of current month
  const timeMax = new Date(now.getFullYear(), now.getMonth() + 1, 0, 23, 59, 59).toISOString(); // last day of month
  
  fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${timeMin}&timeMax=${timeMax}&singleEvents=true&orderBy=startTime`, {
    headers: { 'Authorization': 'Bearer ' + access_token }
  })
  .then(res => res.json())
  .then(data => {
    if(data.error) throw new Error(data.error.message);
    
    ALL_MEETINGS = data.items.map(ev => {
      if(!ev.start || !ev.start.dateTime) return null;
      
      const st = new Date(ev.start.dateTime);
      const en = new Date(ev.end.dateTime);
      const dur = Math.round((en - st) / 60000);
      
      // Encontrar vendor
      let vendorId = 'otro';
      if(ev.organizer && ev.organizer.email !== 'agenda.virtual@nubceo.com') {
        vendorId = getVendorByEmail(ev.organizer.email);
      } else if (ev.attendees) {
        const nubceoAtt = ev.attendees.find(a => a.email.endsWith('@nubceo.com') && a.email !== 'agenda.virtual@nubceo.com');
        if(nubceoAtt) vendorId = getVendorByEmail(nubceoAtt.email);
      }
      
      return {
        date: st.toISOString().slice(0,10),
        time: st.toLocaleTimeString('es-AR', {hour:'2-digit',minute:'2-digit',hour12:false}),
        dur: dur,
        title: ev.summary || 'Sin título',
        vendor: vendorId,
        type: classifyMeeting(ev.summary || ''),
        meet: ev.hangoutLink || null,
        contacts: ev.attendees ? ev.attendees.filter(a => !a.email.endsWith('@nubceo.com')).map(a => a.email) : [],
        desc: ev.description || 'Sin descripción'
      };
    }).filter(m => m !== null);
    
    document.getElementById('periodTitle').textContent = "Dashboard Comercial";
    renderAgenda(document.getElementById('datePicker').value);
    renderKPIs();
  })
  .catch(err => {
    console.error(err);
    document.getElementById('periodTitle').textContent = "Error al sincronizar";
    alert("Error de API: " + err.message);
  });
}

function logout() {
  localStorage.removeItem('nubceo_client_id');
  location.reload();
}

// --- RENDER ---
function renderKPIs() {
  const m = ALL_MEETINGS;
  const p = m.filter(x=>x.type==='primera').length;
  const s = m.filter(x=>x.type==='seguimiento').length;
  const x = m.filter(x=>x.type==='partner').length;
  document.getElementById('kpiStrip').innerHTML = `
    <div class="kp hi"><div class="n">${m.length}</div><div class="l">Reuniones</div></div>
    <div class="kp"><div class="n">${p}</div><div class="l">1ras</div></div>
    <div class="kp"><div class="n">${s}</div><div class="l">Seguimientos</div></div>
    <div class="kp"><div class="n">${x}</div><div class="l">Partners</div></div>
  `;
}

function renderAgenda(date) {
  const ms = ALL_MEETINGS.filter(m => m.date === date).sort((a,b)=>a.time.localeCompare(b.time));
  const cont = document.getElementById('meetingsContainer');
  if(!ms.length) {
    cont.innerHTML = '<div class="nodata">No hay reuniones para esta fecha.</div>';
    return;
  }
  
  cont.innerHTML = ms.map((m,i) => `
    <div class="mr ${m.type}" onclick="this.classList.toggle('open')">
      <div class="mh">
        <div class="mt">${m.time}<small>${m.dur}′</small></div>
        <div class="mc">
          <div class="mn">${m.title}</div>
          <span class="vc" style="background:${getVendorColor(m.vendor)}">${getVendorName(m.vendor)}</span>
        </div>
        <div class="bdg ${m.type}">${m.type}</div>
        <div class="chev">▾</div>
      </div>
      <div class="mb">
        <div class="ctx">
          <strong>Contactos:</strong> ${m.contacts.length ? m.contacts.join(', ') : 'Ninguno externo'}<br><br>
          <strong>Detalle:</strong><br>${m.desc}
        </div>
        ${m.meet ? `<a href="${m.meet}" target="_blank" class="meet-btn">📹 Unirse al Meet</a>` : ''}
      </div>
    </div>
  `).join('');
}

function renderRanking() {
  const stats = {};
  for(let id in VENDORS) stats[id] = {p:0,s:0,x:0};
  
  ALL_MEETINGS.forEach(m => {
    if(!stats[m.vendor]) return;
    if(m.type==='primera') stats[m.vendor].p++;
    if(m.type==='seguimiento') stats[m.vendor].s++;
    if(m.type==='partner') stats[m.vendor].x++;
  });
  
  const sorted = Object.keys(stats).map(id => ({
    name: VENDORS[id].name,
    t: stats[id].p + stats[id].s + stats[id].x,
    ...stats[id]
  })).sort((a,b)=>b.t - a.t);
  
  document.getElementById('rankingTable').innerHTML = `
    <thead><tr><th>Pos</th><th>Vendedor</th><th>1ras</th><th>Seg.</th><th>Total</th></tr></thead>
    <tbody>
      ${sorted.map((v,i) => `
        <tr>
          <td><b style="font-size:12pt;color:var(--blue)">${i+1}</b></td>
          <td><b>${v.name}</b></td>
          <td>${v.p}</td>
          <td>${v.s}</td>
          <td><b style="font-size:12pt;color:var(--blue)">${v.t}</b></td>
        </tr>
      `).join('')}
    </tbody>
  `;
}

function renderVendors() {
  const stats = {};
  for(let id in VENDORS) stats[id] = {t:0};
  
  ALL_MEETINGS.forEach(m => {
    if(stats[m.vendor]) stats[m.vendor].t++;
  });
  
  const sorted = Object.keys(stats).map(id => ({name: VENDORS[id].name, t: stats[id].t})).sort((a,b)=>b.t-a.t);
  
  document.getElementById('vendorGrid').innerHTML = sorted.map(v => `
    <div class="vcard">
      <div class="vtot">${v.t}</div>
      <div style="font-weight:bold;margin-bottom:10px;">${v.name}</div>
      <div style="font-size:8pt;color:var(--mt)">Reuniones en el mes</div>
    </div>
  `).join('');
}

document.getElementById('datePicker').addEventListener('change', e => renderAgenda(e.target.value));

window.onload = initGAPI;

</script>
</body>
</html>
